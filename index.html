<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sảnh Trò Chơi Xúc Xắc VIP - Hoàn Thiện Hệ Thống</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f1622;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Nút hack ẩn bí mật (Góc trên bên trái) */
        .secret-node {
            position: absolute;
            top: 0;
            left: 0;
            width: 45px;
            height: 45px;
            background: transparent;
            z-index: 9999;
            cursor: pointer;
        }

        .game-wrapper {
            background: #16202c;
            width: 100%;
            max-width: 460px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border: 1px solid #283747;
            overflow: hidden;
            position: relative;
        }

        /* Header sảnh */
        .game-header {
            background: linear-gradient(90deg, #1a2634 0%, #101923 100%);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #dfb659;
        }

        .brand {
            font-weight: bold;
            color: #dfb659;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .balance-box {
            background: #091017;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #34495e;
            font-size: 0.95rem;
            color: #2ecc71;
            font-weight: bold;
        }

        /* Khung đăng nhập */
        .auth-overlay {
            padding: 40px 20px;
            text-align: center;
        }

        .auth-overlay input {
            width: 85%;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #34495e;
            background: #091017;
            color: white;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
        }

        .btn-gold {
            background: linear-gradient(180deg, #ffe082 0%, #ca9e28 100%);
            color: #111;
            padding: 12px 35px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(202, 158, 40, 0.3);
        }

        /* Khu vực hiển thị bàn chơi */
        .game-body {
            display: none;
            padding: 15px;
        }

        /* ====== KHU VỰC DEALER ====== */
        .dealer-container {
            width: 100%;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 10px;
            position: relative;
            background: radial-gradient(circle, #1f2f44 0%, transparent 70%);
        }

        .dealer-avatar {
            width: 80px;
            height: 110px;
            position: relative;
            transform-origin: bottom center;
            animation: dealer-idle 3s infinite ease-in-out;
        }

        .dealer-avatar::before {
            content: '🐰';
            position: absolute;
            top: -22px;
            left: 26px;
            font-size: 1.5rem;
        }

        .dealer-face {
            width: 50px;
            height: 50px;
            background: #ffdbac;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            border-bottom: 4px solid #4a3728;
        }
        
        .dealer-face::after {
            content: '👁️  👁️';
            position: absolute;
            top: 15px;
            left: 8px;
            font-size: 0.6rem;
        }

        .dealer-body {
            width: 64px;
            height: 60px;
            background: #111;
            border-radius: 20px 20px 0 0;
            margin: -5px auto 0 auto;
            border-top: 12px solid #ffdbac;
            position: relative;
            box-shadow: inset 0 10px 0 #e74c3c;
        }

        .dealer-hands {
            position: absolute;
            width: 90px;
            height: 30px;
            top: 60px;
            left: -5px;
            display: flex;
            justify-content: space-between;
            transform-origin: center;
        }

        .hand {
            width: 25px;
            height: 15px;
            background: #ffdbac;
            border-radius: 10px;
        }

        @keyframes dealer-idle {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.02) rotate(1deg); }
        }

        .dealer-shaking {
            animation: dealer-action 0.12s infinite alternate !important;
        }

        @keyframes dealer-action {
            0% { transform: translateY(0) scaleY(1) rotate(-3deg); }
            100% { transform: translateY(-15px) scaleY(0.95) rotate(3deg); }
        }

        /* Đồng hồ đếm ngược */
        .timer-container {
            text-align: center;
            margin-bottom: 10px;
        }
        .timer-title { color: #7f8c8d; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;}
        .timer-clock { font-size: 1.6rem; font-weight: bold; color: #e74c3c; margin-top: 2px;}

        /* Đĩa chứa xúc xắc */
        .dice-area {
            background: #091017;
            border-radius: 15px;
            padding: 15px;
            width: 180px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border: 2px solid #2c3e50;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }

        .dice-unit {
            width: 42px;
            height: 42px;
            background: #fff;
            color: #222;
            border-radius: 8px;
            font-size: 1.6rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .cup-shake { animation: sfx-shake 0.1s infinite alternate; }
        @keyframes sfx-shake {
            0% { transform: translate(3px, 1px); }
            100% { transform: translate(-3px, -1px); }
        }

        /* Cửa cược */
        .bet-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .bet-box {
            flex: 1;
            background: #1c2836;
            border: 2px solid #34495e;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .bet-box h2 { font-size: 1.4rem; margin-bottom: 3px; }
        .bet-box p { font-size: 0.75rem; color: #7f8c8d; }

        .bet-box.selected-tai { background: #c0392b; border-color: #e74c3c; }
        .bet-box.selected-xiu { background: #2980b9; border-color: #3498db; }

        .toast-result {
            font-size: 1.1rem;
            font-weight: bold;
            color: #f1c40f;
            min-height: 25px;
            margin-top: 10px;
            text-align: center;
        }

        /* Bảng cầu lịch sử */
        .history-section {
            background: #091017;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .history-title { font-size: 0.75rem; color: #7f8c8d; margin-bottom: 6px; text-align: left; }
        .beads-list { display: flex; gap: 5px; overflow-x: auto; }
        .bead {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            flex-shrink: 0;
        }
        .bead.t { background: #e74c3c; color: white; }
        .bead.x { background: #3498db; color: white; }
        .bead.h { background: #2ecc71; color: white; }

        .dev-log {
            position: absolute;
            bottom: 5px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<div class="secret-node" onclick="triggerMobileCheat()"></div>

<div class="game-wrapper">
    <div class="game-header">
        <div class="brand">✨ THƯỢNG HẢI CLUB VIP</div>
        <div class="balance-box" id="balance-display">0 $</div>
    </div>

    <!-- Login -->
    <div class="auth-overlay" id="login-box">
        <h1 style="color: #dfb659; font-size: 1.6rem; margin-bottom: 10px;">HỆ THỐNG TRẢI NGHIỆM</h1>
        <p style="color: #7f8c8d; font-size: 0.85rem; margin-bottom: 25px;">Nhập ID bất kỳ để kết nối với nữ Dealer hệ thống.</p>
        <input type="text" id="player-id" placeholder="Nhập tên tài khoản..." maxlength="12">
        <br>
        <button class="btn-gold" onclick="loginSystem()">VÀO SẢNH VIP</button>
    </div>

    <!-- Bàn chơi chính -->
    <div class="game-body" id="main-game">
        <div class="dealer-container">
            <div class="dealer-avatar" id="dealer-girl">
                <div class="dealer-face"></div>
                <div class="dealer-body"></div>
                <div class="dealer-hands">
                    <div class="hand"></div>
                    <div class="hand"></div>
                </div>
            </div>
        </div>

        <div class="timer-container">
            <div class="timer-title" id="status-label">Hệ thống mở cổng cược</div>
            <div class="timer-clock" id="countdown-clock">00:15</div>
        </div>

        <div class="dice-area" id="dice-cup">
            <div class="dice-unit" id="d1">1</div>
            <div class="dice-unit" id="d2">1</div>
        </div>

        <div class="bet-buttons">
            <div class="bet-box" id="btn-tai" onclick="selectSide('tai')">
                <h2>TÀI</h2>
                <p>9 - 12 nút (1 ăn 1)</p>
            </div>
            <div class="bet-box" id="btn-xiu" onclick="selectSide('xiu')">
                <h2>XỈU</h2>
                <p>2 - 6 nút (1 ăn 1)</p>
            </div>
        </div>

        <div class="toast-result" id="game-toast">Vui lòng chọn cửa cược trước khi hết giờ!</div>

        <div class="history-section">
            <div class="history-title">Bảng thống kê đường cầu gần đây:</div>
            <div class="beads-list" id="history-beads">
                <div class="bead t">T</div><div class="bead x">X</div><div class="bead t">T</div><div class="bead x">X</div>
            </div>
        </div>
    </div>
</div>

<div class="dev-log" id="cheat-indicator">Mode: Auto</div>

<script>
    let currentSide = null; 
    let isLocked = false;
    let timeRemaining = 15;
    let timerInterval = null;
    let currentCheat = "normal"; 

    // Bàn phím Máy tính
    window.addEventListener("keydown", function(e) {
        let key = e.key.toLowerCase();
        if (key === "t") {
            currentCheat = "force-tai";
            document.getElementById("cheat-indicator").innerText = "Mode: Ép TÀI";
        } else if (key === "x") {
            currentCheat = "force-xiu";
            document.getElementById("cheat-indicator").innerText = "Mode: Ép XỈU";
        } else if (key === "h") {
            currentCheat = "force-hoa";
            document.getElementById("cheat-indicator").innerText = "Mode: Ép HÒA";
        } else if (key === "n") {
            currentCheat = "normal";
            document.getElementById("cheat-indicator").innerText = "Mode: Auto";
        }
    });

    // Chạm góc màn hình Điện thoại
    let touchCounter = 0;
    function triggerMobileCheat() {
        touchCounter++;
        if (touchCounter % 4 === 1) {
            currentCheat = "force-tai";
            document.getElementById("cheat-indicator").innerText = "Mode: Ép TÀI";
        } else if (touchCounter % 4 === 2) {
            currentCheat = "force-xiu";
            document.getElementById("cheat-indicator").innerText = "Mode: Ép XỈU";
        } else if (touchCounter % 4 === 3) {
            currentCheat = "force-hoa";
            document.getElementById("cheat-indicator").innerText = "Mode: Ép HÒA";
        } else {
            currentCheat = "normal";
            document.getElementById("cheat-indicator").innerText = "Mode: Auto";
        }
    }

    // PHÁT GIỌNG ĐỌC TIẾNG VIỆT (Đã bọc try-catch chống sập code)
    function speakResult(text) {
        try {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 1.0;
                utterance.pitch = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        } catch (e) {
            console.log("Trình duyệt chặn hoặc lỗi âm thanh: ", e);
        }
    }

    // ĐĂNG NHẬP
    function loginSystem() {
        let name = document.getElementById("player-id").value.trim();
        if(!name) return alert("Vui lòng nhập ID!");

        let data = localStorage.getItem(name);
        if(!data) {
            let userObj = { name: name, balance: 5000 };
            localStorage.setItem(name, JSON.stringify(userObj));
        }
        sessionStorage.setItem("activeUser", name);
        
        document.getElementById("login-box").style.display = "none";
        document.getElementById("main-game").style.display = "block";
        
        updateHeaderBalance();
        
        // Chạy đếm thời gian trước, đọc giọng nói sau để tránh lỗi nghẽn trình duyệt
        startNewRound();
        setTimeout(() => {
            speakResult("Chào mừng bạn đã đến với hệ thống giải trí.");
        }, 300);
    }

    function updateHeaderBalance() {
        let name = sessionStorage.getItem("activeUser");
        if(name) {
            let userObj = JSON.parse(localStorage.getItem(name));
            document.getElementById("balance-display").innerText = userObj.balance.toLocaleString() + " $";
        }
    }

    function selectSide(side) {
        if (isLocked) return;
        currentSide = side;
        document.getElementById("btn-tai").className = "bet-box" + (side === 'tai' ? " selected-tai" : "");
        document.getElementById("btn-xiu").className = "bet-box" + (side === 'xiu' ? " selected-xiu" : "");
        document.getElementById("game-toast").innerText = "Hệ thống ghi nhận đặt ván này vào cửa " + (side === 'tai' ? "TÀI" : "XỈU");
    }

    // VÒNG LẶP ĐẾM THỜI GIAN CHUẨN
    function startNewRound() {
        isLocked = false;
        currentSide = null;
        timeRemaining = 15;
        document.getElementById("status-label").innerText = "Hệ thống mở cổng cược";
        document.getElementById("status-label").style.color = "#7f8c8d";
        document.getElementById("game-toast").innerText = "Mời bạn chọn cửa!";
        document.getElementById("btn-tai").className = "bet-box";
        document.getElementById("btn-xiu").className = "bet-box";
        document.getElementById("countdown-clock").innerText = "00:15";
        
        document.getElementById("dealer-girl").className = "dealer-avatar";

        clearInterval(timerInterval); // Xóa bộ đếm cũ chống lặp đúp dữ liệu
        
        timerInterval = setInterval(() => {
            timeRemaining--;
            
            if (timeRemaining === 4) {
                document.getElementById("status-label").innerText = "Đóng cổng cược - Ngừng nhận lệnh";
                document.getElementById("status-label").style.color = "#f39c12";
                isLocked = true;
            }

            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                document.getElementById("countdown-clock").innerText = "00:00";
                executeRoll();
            } else {
                document.getElementById("countdown-clock").innerText = "00:" + (timeRemaining < 10 ? "0" : "") + timeRemaining;
            }
        }, 1000);
    }

    // ÂM THANH XOẢNG XOẢNG BẰNG CODE
    let ctx;
    function sfx(f, d) {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if(!ctx) ctx = new AudioContext();
            let osc = ctx.createOscillator();
            let gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(f, ctx.currentTime);
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + d);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + d);
        } catch(e) {}
    }

    function executeRoll() {
        document.getElementById("status-label").innerText = "Dealer đang thực hiện lắc...";
        document.getElementById("status-label").style.color = "#e74c3c";
        
        document.getElementById("dealer-girl").className = "dealer-avatar dealer-shaking";
        document.getElementById("dice-cup").className = "dice-area cup-shake";

        let sfxCount = 0;
        let sfxLoop = setInterval(() => {
            sfx(190 + Math.random()*70, 0.04);
            sfxCount++;
            if(sfxCount >= 15) clearInterval(sfxLoop);
        }, 50);

        let d1 = document.getElementById("d1");
        let d2 = document.getElementById("d2");
        let shuffle = setInterval(() => {
            d1.innerText = Math.floor(Math.random() * 6) + 1;
            d2.innerText = Math.floor(Math.random() * 6) + 1;
        }, 40);

        setTimeout(() => {
            clearInterval(shuffle);
            
            document.getElementById("dealer-girl").className = "dealer-avatar";
            document.getElementById("dice-cup").className = "dice-area";

            let r1, r2, finalSum;

            if (currentCheat === "force-tai") {
                r1 = Math.floor(Math.random() * 2) + 5; 
                r2 = Math.floor(Math.random() * 2) + 5; 
            } else if (currentCheat === "force-xiu") {
                r1 = Math.floor(Math.random() * 2) + 1; 
                r2 = Math.floor(Math.random() * 2) + 1; 
            } else if (currentCheat === "force-hoa") {
                r1 = 4; r2 = 3; 
            } else {
                r1 = Math.floor(Math.random() * 6) + 1;
                r2 = Math.floor(Math.random() * 6) + 1;
            }

            finalSum = r1 + r2;
            d1.innerText = r1;
            d2.innerText = r2;

            sfx(110, 0.25);
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);

            let name = sessionStorage.getItem("activeUser");
            let userObj = JSON.parse(localStorage.getItem(name));
            
            let outcome = "";
            let speechText = "";
            if (finalSum === 7) {
                outcome = "hoa"; speechText = `Bảy nút, Hòa.`;
            } else if (finalSum >= 8) {
                outcome = "tai"; speechText = `${finalSum} nút, Tài.`;
            } else {
                outcome = "xiu"; speechText = `${finalSum} nút, Xỉu.`;
            }

            speakResult(speechText);
            
            let beadList = document.getElementById("history-beads");
            let newBead = document.createElement("div");
            if (outcome === "tai") {
                newBead.className = "bead t"; newBead.innerText = "T";
            } else if (outcome === "xiu") {
                newBead.className = "bead x"; newBead.innerText = "X";
            } else {
                newBead.className = "bead h"; newBead.innerText = "H";
            }
            beadList.appendChild(newBead);

            if(currentSide === null) {
                document.getElementById("game-toast").innerText = `Kết quả phiên: ${speechText}`;
            } else if(currentSide === outcome) {
                userObj.balance += 500;
                document.getElementById("game-toast").innerText = `Chúc mừng! Bạn đoán chính xác cửa ${outcome.toUpperCase()} (+500$)`;
            } else {
                userObj.balance -= 500;
                document.getElementById("game-toast").innerText = `Rất tiếc! Hệ thống báo kết quả cửa ${outcome.toUpperCase()} (-500$)`;
            }

            localStorage.setItem(name, JSON.stringify(userObj));
            updateHeaderBalance();

            setTimeout(() => {
                startNewRound();
            }, 4500);

        }, 1200);
    }
</script>
</body>
</html>
